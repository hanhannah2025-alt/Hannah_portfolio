<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --brand-primary: #804825;
            --text-primary: #111111;
            --text-secondary: #888888;
            --text-tertiary: #FFFFFF;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F4F4F4;
            --border-color: #D8D8D8;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --blur-backdrop: blur(10px);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-secondary);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .app-container {
            max-width: 430px;
            margin: 0 auto;
            background-color: var(--bg-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-primary);
        }

        .status-bar .time {
            font-size: 14px;
            font-weight: 600;
        }

        .status-bar .icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .status-bar .icons svg {
            width: 16px;
            height: 16px;
        }

        /* Top Navigation */
        .top-nav {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-primary), #a05c35);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-greeting {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .location-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 15px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
        }

        .location-selector:hover {
            color: var(--text-primary);
        }

        .location-selector svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s;
        }

        .location-selector.open svg {
            transform: rotate(180deg);
        }

        .menu-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background: var(--bg-secondary);
        }

        /* Search Bar */
        .search-section {
            padding: 0 20px 16px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 10px 20px;
            transition: box-shadow 0.3s, background 0.3s;
        }

        .search-bar:focus-within {
            box-shadow: var(--shadow);
            background: var(--bg-primary);
        }

        .search-bar svg {
            width: 24px;
            height: 24px;
            color: var(--text-secondary);
        }

        .search-bar input {
            border: none;
            background: transparent;
            font-size: 16px;
            flex: 1;
            outline: none;
            color: var(--text-primary);
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        /* Section Headers */
        .section-header {
            padding: 0 20px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .see-all {
            font-size: 14px;
            color: var(--brand-primary);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .see-all:hover {
            opacity: 0.8;
        }

        /* Recommended Hotels - Horizontal Scroll */
        .recommended-section {
            padding: 0 0 20px;
        }

        .hotels-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 0 20px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .hotels-scroll::-webkit-scrollbar {
            display: none;
        }

        .hotel-card {
            min-width: 268px;
            scroll-snap-align: start;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .hotel-card:hover {
            transform: translateY(-4px);
        }

        .hotel-image {
            width: 268px;
            height: 180px;
            background: linear-gradient(135deg, #e8d5c4 0%, #c9a882 100%);
            border-radius: var(--radius-xl);
            position: relative;
            overflow: hidden;
        }

        .hotel-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .favorite-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 2;
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }

        .favorite-btn.active svg {
            fill: #ff4757;
            color: #ff4757;
        }

        .favorite-btn svg {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
            transition: fill 0.3s, color 0.3s;
        }

        .hotel-info {
            padding: 12px 4px 4px;
        }

        .hotel-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .hotel-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .hotel-rating svg {
            width: 16px;
            height: 16px;
            color: #ffd700;
        }

        .hotel-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--brand-primary);
            margin-top: 8px;
        }

        .hotel-price span {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* Popular Destinations - Grid */
        .destinations-section {
            padding: 0 20px 100px;
        }

        .destinations-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .destination-card {
            position: relative;
            border-radius: var(--radius-xl);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            aspect-ratio: 166/220;
        }

        .destination-card:hover {
            transform: scale(1.02);
        }

        .destination-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .destination-card:hover img {
            transform: scale(1.1);
        }

        .destination-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
        }

        .destination-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .destination-count {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 8px 20px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            transition: all 0.3s;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .nav-item span {
            font-size: 11px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .nav-item.active svg {
            color: var(--brand-primary);
        }

        .nav-item.active span {
            color: var(--brand-primary);
        }

        .nav-item:hover {
            background: var(--bg-secondary);
        }

        /* Location Dropdown */
        .location-dropdown {
            position: absolute;
            top: 110px;
            left: 82px;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 8px 0;
            z-index: 1000;
            display: none;
            min-width: 150px;
        }

        .location-dropdown.active {
            display: block;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .location-dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .location-dropdown-item:hover {
            background: var(--bg-secondary);
        }

        .location-dropdown-item svg {
            width: 16px;
            height: 16px;
            color: var(--brand-primary);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            max-width: 300px;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive Design */
        @media (max-width: 420px) {
            .hotel-card {
                min-width: 240px;
            }

            .hotel-image {
                width: 240px;
                height: 160px;
            }
        }

        @media (min-width: 431px) {
            body {
                background: #e5e5e5;
            }

            .app-container {
                border-radius: 24px;
                margin: 20px auto;
                box-shadow: 0 4px 40px rgba(0,0,0,0.1);
                min-height: calc(100vh - 40px);
            }

            .bottom-nav {
                border-radius: 0 0 24px 24px;
            }
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

            <div class="icons">

        <!-- Location Dropdown -->
        <div class="location-dropdown" id="locationDropdown">
            <div class="location-dropdown-item" data-location="Shanghai">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            </div>

        <!-- Search Section -->
        <div class="search-section">

    <script>
        // Data
        const hotels = [
            {
                id: 1,
                name: 'Renaissance Hotel',
                rating: 4.8,
                reviews: 182,
                price: 547,
                image: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=500&h=350&fit=crop'
            },
            {
                id: 2,
                name: 'Grand Hyatt',
                rating: 4.9,
                reviews: 256,
                price: 720,
                image: 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=500&h=350&fit=crop'
            },
            {
                id: 3,
                name: 'The Peninsula',
                rating: 4.7,
                reviews: 198,
                price: 850,
                image: 'https://images.unsplash.com/photo-1582719508461-905c673771fd?w=500&h=350&fit=crop'
            },
            {
                id: 4,
                name: 'Mandarin Oriental',
                rating: 4.9,
                reviews: 312,
                price: 920,
                image: 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=500&h=350&fit=crop'
            }
        ];

        const destinations = [
            { id: 1, name: 'The Bund', count: '245 hotels', image: 'https://images.unsplash.com/photo-1548625361-9871c9c3e6cb?w=400&h=500&fit=crop' },
            { id: 2, name: 'Olympic Park', count: '189 hotels', image: 'https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=400&h=500&fit=crop' },
            { id: 3, name: 'Forbidden City', count: '167 hotels', image: 'https://images.unsplash.com/photo-1508804052814-cd3ba865a116?w=400&h=500&fit=crop' },
            { id: 4, name: 'Temple of Heaven', count: '134 hotels', image: 'https://images.unsplash.com/photo-1599571234909-29ed5d1321d6?w=400&h=500&fit=crop' }
        ];

        // DOM Elements
        const hotelsScroll = document.getElementById('hotelsScroll');
        const destinationsGrid = document.getElementById('destinationsGrid');
        const locationSelector = document.getElementById('locationSelector');
        const locationDropdown = document.getElementById('locationDropdown');
        const currentLocation = document.getElementById('currentLocation');
        const searchInput = document.getElementById('searchInput');
        const navItems = document.querySelectorAll('.nav-item');
        const menuBtn = document.getElementById('menuBtn');
        const toast = document.getElementById('toast');
        const statusTime = document.getElementById('statusTime');

        // Initialize
        function init() {
            renderHotels();
            renderDestinations();
            updateStatusTime();
            setInterval(updateStatusTime, 60000);
            setupEventListeners();
        }

        // Render Hotels
        function renderHotels() {
            hotelsScroll.innerHTML = hotels.map(hotel => `
                <div class="hotel-card" data-hotel-id="${hotel.id}">
                    <div class="hotel-image skeleton">
                        <img src="${hotel.image}" alt="${hotel.name}" loading="lazy" onload="this.parentElement.classList.remove('skeleton')">
                        <div class="favorite-btn" onclick="toggleFavorite(this, '${hotel.name}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="hotel-info">
                        <div class="hotel-name">${hotel.name}</div>
                        <div class="hotel-rating">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                            <span>${hotel.rating} (${hotel.reviews} reviews)</span>
                        </div>
                        <div class="hotel-price">$${hotel.price}<span>/night</span></div>
                    </div>
                </div>
            `).join('');
        }

        // Render Destinations
        function renderDestinations() {
            destinationsGrid.innerHTML = destinations.map(dest => `
                <div class="destination-card" data-dest-id="${dest.id}">
                    <img src="${dest.image}" alt="${dest.name}" loading="lazy" class="skeleton" onload="this.classList.remove('skeleton')">
                    <div class="destination-overlay">
                        <div class="destination-name">${dest.name}</div>
                        <div class="destination-count">${dest.count}</div>
                    </div>
                </div>
            `).join('');
        }

        // Update Status Time
        function updateStatusTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            statusTime.textContent = `${hours}:${minutes}`;
        }

        // Toggle Favorite
        window.toggleFavorite = function(btn, hotelName) {
            event.stopPropagation();
            btn.classList.toggle('active');
            const isFavorite = btn.classList.contains('active');
            showToast(isFavorite ? `${hotelName} added to favorites` : `${hotelName} removed from favorites`);
        };

        // Show Toast
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Location Dropdown
            locationSelector.addEventListener('click', () => {
                locationDropdown.classList.toggle('active');
                locationSelector.classList.toggle('open');
            });

            document.querySelectorAll('.location-dropdown-item').forEach(item => {
                item.addEventListener('click', () => {
                    const location = item.dataset.location;
                    currentLocation.textContent = location;
                    locationDropdown.classList.remove('active');
                    locationSelector.classList.remove('open');
                    showToast(`Location changed to ${location}`);
                });
            });

            // Close dropdown on outside click
            document.addEventListener('click', (e) => {
                if (!locationSelector.contains(e.target) && !locationDropdown.contains(e.target)) {
                    locationDropdown.classList.remove('active');
                    locationSelector.classList.remove('open');
                }
            });

            // Search
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                document.querySelectorAll('.hotel-card').forEach(card => {
                    const name = card.querySelector('.hotel-name').textContent.toLowerCase();
                    card.style.display = name.includes(query) ? 'block' : 'none';
                });
            });

            // Bottom Navigation
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    navItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const page = item.dataset.page;
                    showToast(`Navigating to ${page}`);
                });
            });

            // Hotel Card Click
            hotelsScroll.addEventListener('click', (e) => {
                const card = e.target.closest('.hotel-card');
                if (card && !e.target.closest('.favorite-btn')) {
                    const hotelId = card.dataset.hotelId;
                    const hotel = hotels.find(h => h.id == hotelId);
                    showToast(`Opening ${hotel.name} details`);
                }
            });

            // Destination Click
            destinationsGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.destination-card');
                if (card) {
                    const destId = card.dataset.destId;
                    const dest = destinations.find(d => d.id == destId);
                    showToast(`Exploring ${dest.name}`);
                }
            });

            // See All Click
            document.querySelectorAll('.see-all').forEach(btn => {
                btn.addEventListener('click', () => {
                    showToast('Loading all results...');
                });
            });

            // Menu Button
            menuBtn.addEventListener('click', () => {
                showToast('Menu coming soon');
            });

            // Horizontal scroll with buttons (optional enhancement)
            let isDown = false;
            let startX;
            let scrollLeft;

            hotelsScroll.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - hotelsScroll.offsetLeft;
                scrollLeft = hotelsScroll.scrollLeft;
            });

            hotelsScroll.addEventListener('mouseleave', () => isDown = false);
            hotelsScroll.addEventListener('mouseup', () => isDown = false);
            hotelsScroll.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - hotelsScroll.offsetLeft;
                const walk = (x - startX) * 2;
                hotelsScroll.scrollLeft = scrollLeft - walk;
            });
        }

        // Start the app
        init();
    </script>
</body>
</html>
